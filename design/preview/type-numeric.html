<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 20px; }
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .stat { background: var(--bg-elevated); border-radius: 12px; padding: 14px; border: 1px solid var(--border-subtle); }
  .label { font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--fg-3); margin-bottom: 6px; }
  .num { font-size: 32px; font-weight: 700; line-height: 1; letter-spacing: -0.03em; font-variant-numeric: tabular-nums; color: var(--fg-1); }
  .sub { font-size: 12px; color: var(--fg-3); margin-top: 6px; }
  .gold { color: var(--accent); }
  .note { margin-top: 14px; font-family: var(--font-mono); font-size: 11px; color: var(--fg-4); }
</style>
</head>
<body>
<div class="card">
  <div class="stats">
    <div class="stat"><div class="label">Alunos</div><div class="num">128</div><div class="sub">+4 este mês</div></div>
    <div class="stat"><div class="label">Ativos</div><div class="num" style="color:#4ADE80">116</div><div class="sub">90.6%</div></div>
    <div class="stat"><div class="label">Em atraso</div><div class="num" style="color:#F87171">7</div><div class="sub">R$ 1.260</div></div>
    <div class="stat"><div class="label">Receita</div><div class="num gold">R$ 21.8k</div><div class="sub">Out/25</div></div>
  </div>
  <div class="note">font-variant-numeric: tabular-nums — alinha vírgulas e unidades em tabelas.</div>
</div>
</body>
</html>
