<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>TatameHub — Mobile app</title>
<link rel="stylesheet" href="app.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="login-phone" class="phone"></div>
<div id="home-phone" class="phone"></div>
<div id="students-phone" class="phone"></div>
<div id="detail-phone" class="phone"></div>
<div id="add-phone" class="phone"></div>
<div id="link-phone" class="phone"></div>
<div id="finance-phone" class="phone"></div>
<div id="reports-phone" class="phone"></div>
<div id="settings-phone" class="phone"></div>

<script type="text/babel" src="Icon.jsx"></script>
<script type="text/babel" src="Primitives.jsx"></script>
<script type="text/babel" src="Screens.jsx"></script>
<script type="text/babel">
const { useState } = React;

function Phone({ label, activeTab = 'home', children }) {
  return (
    <>
      <StatusBar />
      {children}
      <TabBar active={activeTab} onNavigate={() => {}} />
    </>
  );
}

const student = { name: 'Ana Ribeiro', art: 'BJJ · Branca', price: 180, status: 'late', lateDays: 3 };

const roots = [
  { id: 'login-phone', content: <><StatusBar /><LoginScreen /></> },
  { id: 'home-phone', content: <Phone activeTab="home"><HomeScreen onNavigate={() => {}} /></Phone> },
  { id: 'students-phone', content: <Phone activeTab="students"><StudentsScreen /></Phone> },
  { id: 'detail-phone', content: <Phone activeTab="students"><StudentDetailScreen student={student} /></Phone> },
  { id: 'add-phone', content: <Phone activeTab="add"><AddStudentScreen /></Phone> },
  { id: 'link-phone', content: <Phone activeTab="add"><LinkScreen /></Phone> },
  { id: 'finance-phone', content: <Phone activeTab="finance"><FinanceScreen /></Phone> },
  { id: 'reports-phone', content: <Phone activeTab="finance"><ReportsScreen /></Phone> },
  { id: 'settings-phone', content: <Phone activeTab="settings"><SettingsScreen /></Phone> },
];

roots.forEach(r => {
  const el = document.getElementById(r.id);
  if (el) ReactDOM.createRoot(el).render(r.content);
});
</script>
</body>
</html>
