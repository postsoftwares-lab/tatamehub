<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="_card.css">
<style>
  .swatches { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; }
  .sw { aspect-ratio: 1 / 1; border-radius: 10px; padding: 8px; display: flex; flex-direction: column; justify-content: space-between; box-shadow: inset 0 0 0 1px rgba(255,255,255,0.04); }
  .sw-name { font-size: 10.5px; font-weight: 600; }
  .sw-hex { font-family: var(--font-mono); font-size: 9.5px; opacity: 0.7; }
</style>
</head>
<body>
<div class="card">
  <div class="swatches">
    <div class="sw" style="background:#09090B;color:#C9CCD2"><span class="sw-name">950</span><span class="sw-hex">09090B</span></div>
    <div class="sw" style="background:#0F0F11;color:#C9CCD2"><span class="sw-name">900</span><span class="sw-hex">0F0F11</span></div>
    <div class="sw" style="background:#16171A;color:#C9CCD2"><span class="sw-name">850</span><span class="sw-hex">16171A</span></div>
    <div class="sw" style="background:#1C1D21;color:#C9CCD2"><span class="sw-name">800</span><span class="sw-hex">1C1D21</span></div>
    <div class="sw" style="background:#24262B;color:#C9CCD2"><span class="sw-name">750</span><span class="sw-hex">24262B</span></div>
    <div class="sw" style="background:#2E3036;color:#C9CCD2"><span class="sw-name">700</span><span class="sw-hex">2E3036</span></div>
    <div class="sw" style="background:#3B3E45;color:#E6E7EA"><span class="sw-name">600</span><span class="sw-hex">3B3E45</span></div>
    <div class="sw" style="background:#575A63;color:#F4F5F7"><span class="sw-name">500</span><span class="sw-hex">575A63</span></div>
    <div class="sw" style="background:#787C85;color:#0F0F11"><span class="sw-name">400</span><span class="sw-hex">787C85</span></div>
    <div class="sw" style="background:#A3A7B0;color:#0F0F11"><span class="sw-name">300</span><span class="sw-hex">A3A7B0</span></div>
    <div class="sw" style="background:#C9CCD2;color:#0F0F11"><span class="sw-name">200</span><span class="sw-hex">C9CCD2</span></div>
    <div class="sw" style="background:#E6E7EA;color:#0F0F11"><span class="sw-name">100</span><span class="sw-hex">E6E7EA</span></div>
    <div class="sw" style="background:#F4F5F7;color:#0F0F11"><span class="sw-name">50</span><span class="sw-hex">F4F5F7</span></div>
    <div class="sw" style="background:#FFFFFF;color:#0F0F11"><span class="sw-name">0</span><span class="sw-hex">FFFFFF</span></div>
  </div>
</div>
</body>
</html>
