<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 20px; }
  .split { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .p { border-radius: 12px; padding: 20px; display: flex; align-items: center; justify-content: center; min-height: 130px; box-shadow: inset 0 0 0 1px rgba(255,255,255,0.04); }
  .dark { background: var(--ink-900); }
  .light { background: var(--ink-50); }
  .lbl { margin-top: 8px; font-size: 10.5px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--fg-3); text-align: center; }
</style>
</head>
<body>
<div class="card">
  <div class="split">
    <div>
      <div class="p dark"><img src="../assets/logo-lockup.svg" height="52" alt="TatameHub"></div>
      <div class="lbl">Lockup · fundo escuro</div>
    </div>
    <div>
      <div class="p light"><img src="../assets/logo-wordmark-light.svg" height="42" alt="TatameHub"></div>
      <div class="lbl">Wordmark · fundo claro</div>
    </div>
  </div>
</div>
</body>
</html>
