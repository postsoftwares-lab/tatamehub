<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 24px 20px; }
  .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px 18px; align-items: start; }
  .btn { font-family: var(--font-sans); font-weight: 600; font-size: 15px; border-radius: 10px; padding: 12px 18px; border: none; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 8px; transition: all 180ms cubic-bezier(0.22,1,0.36,1); }
  .primary { background: #F4F5F7; color: #0F0F11; }
  .secondary { background: #24262B; color: #E6E7EA; box-shadow: inset 0 1px 0 rgba(255,255,255,0.04); }
  .ghost { background: transparent; color: #E6E7EA; border: 1px solid #2E3036; }
  .danger { background: #EF4444; color: white; }
  .sm { font-size: 13px; padding: 8px 12px; border-radius: 8px; }
  .pressed { transform: scale(0.97); filter: brightness(0.92); }
</style>
</head>
<body>
<div class="card">
  <div class="grid">
    <button class="btn primary">+ Cadastrar aluno</button>
    <button class="btn secondary">Cancelar</button>
    <button class="btn primary pressed">+ Cadastrar aluno</button>
    <button class="btn ghost">Ver todos</button>
    <button class="btn danger">Excluir</button>
    <button class="btn primary sm">Marcar pago</button>
  </div>
</div>
</body>
</html>
