<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 18px 20px; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .s { background: #1C1D21; border: 1px solid #2E3036; border-radius: 14px; padding: 14px; position: relative; overflow: hidden; box-shadow: inset 0 1px 0 rgba(255,255,255,0.04); }
  .s.accent::before { content:''; position: absolute; left: 0; right: 0; top: 0; height: 2px; background: #F4F5F7; }
  .lbl { font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: #787C85; }
  .num { font-size: 28px; font-weight: 700; letter-spacing: -0.03em; margin-top: 8px; color: #E6E7EA; font-variant-numeric: tabular-nums; }
  .trend { font-size: 12px; margin-top: 6px; font-weight: 500; }
  .up { color: #4ADE80; } .muted { color: #787C85; }
</style>
</head>
<body>
<div class="card">
  <div class="grid">
    <div class="s"><div class="lbl">Total alunos</div><div class="num">128</div><div class="trend up">↗ +4 este mês</div></div>
    <div class="s accent"><div class="lbl">Receita out/25</div><div class="num">R$ 21.840</div><div class="trend up">↗ +R$ 720</div></div>
    <div class="s"><div class="lbl">Em atraso</div><div class="num" style="color:#F87171">R$ 1.260</div><div class="trend muted">7 alunos</div></div>
  </div>
</div>
</body>
</html>
